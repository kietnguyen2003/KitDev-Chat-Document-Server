services:
  postgres:
    image: postgres:17
    container_name: server-postgres
    environment:
      POSTGRES_DB: rag_server
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d rag_server"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  minio:
    image: minio/minio
    container_name: server_minip
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
